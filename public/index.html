<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive - Ride Sharing Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --dark: #1A1A2E;
            --light: #F7F7F7;
        }
        
        body {
            background: linear-gradient(135deg, var(--dark) 0%, #16213E 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .auth-card h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .auth-card .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-text a {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }

        .alert-danger {
            background: #FFE5E5;
            color: #C41C3B;
        }

        .alert-success {
            background: #E5F9F7;
            color: #00796B;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--primary);
            font-weight: 600;
            margin-top: 15px;
        }

        .loading.show {
            display: block;
        }

        .spinner-border {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }

            .auth-card h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Login Form -->
            <div id="login-form">
                <h1>Welcome Back</h1>
                <p class="subtitle">Sign in to your Drive account</p>
                
                <div id="login-error" class="alert alert-danger d-none" role="alert"></div>
                
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" class="form-control" id="login-email" placeholder="you@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        Sign In
                    </button>
                    
                    <div class="loading" id="login-loading">
                        <div class="spinner-border" role="status"></div>
                        Signing in...
                    </div>
                </form>
                
                <div class="toggle-text">
                    Don't have an account? <a onclick="toggleForm()">Sign up</a>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signup-form" class="d-none">
                <h1>Create Account</h1>
                <p class="subtitle">Join Drive and start riding</p>
                
                <div id="signup-error" class="alert alert-danger d-none" role="alert"></div>
                
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" class="form-control" id="signup-email" placeholder="you@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" class="form-control" id="signup-password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-firstName">First Name</label>
                        <input type="text" class="form-control" id="signup-firstName" placeholder="John" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-lastName">Last Name</label>
                        <input type="text" class="form-control" id="signup-lastName" placeholder="Doe" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        Create Account
                    </button>
                    
                    <div class="loading" id="signup-loading">
                        <div class="spinner-border" role="status"></div>
                        Creating account...
                    </div>
                </form>
                
                <div class="toggle-text">
                    Already have an account? <a onclick="toggleForm()">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080';

        function toggleForm() {
            document.getElementById('login-form').classList.toggle('d-none');
            document.getElementById('signup-form').classList.toggle('d-none');
            document.getElementById('login-error').classList.add('d-none');
            document.getElementById('signup-error').classList.add('d-none');
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            const loadingDiv = document.getElementById('login-loading');

            errorDiv.classList.add('d-none');
            loadingDiv.classList.add('show');

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.fieldErrors?.password?.[0] || 'Login failed');
                }

                // Store tokens
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Redirect to dashboard
                window.location.href = '/dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message || 'An error occurred. Please try again.';
                errorDiv.classList.remove('d-none');
            } finally {
                loadingDiv.classList.remove('show');
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const firstName = document.getElementById('signup-firstName').value;
            const lastName = document.getElementById('signup-lastName').value;
            const errorDiv = document.getElementById('signup-error');
            const loadingDiv = document.getElementById('signup-loading');

            errorDiv.classList.add('d-none');
            loadingDiv.classList.add('show');

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password, firstName, lastName })
                });

                const data = await response.json();

                if (!response.ok) {
                    const fieldError = data.error?.fieldErrors?.password?.[0] || 
                                      data.error?.fieldErrors?.email?.[0] ||
                                      'Signup failed';
                    throw new Error(fieldError);
                }

                // Store tokens
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Redirect to dashboard
                window.location.href = '/dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message || 'An error occurred. Please try again.';
                errorDiv.classList.remove('d-none');
            } finally {
                loadingDiv.classList.remove('show');
            }
        }

        // Check if user is already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('accessToken');
            if (token) {
                window.location.href = '/dashboard.html';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
