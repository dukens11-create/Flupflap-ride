<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="/styles.css" rel="stylesheet" />
  </head>
  <body class="app-bg">
    <main class="container py-4 py-lg-5">
      <div class="d-flex justify-content-between align-items-start mb-4 gap-3 flex-wrap">
        <div>
          <h1 class="h3 fw-bold mb-1">Dashboard</h1>
          <p class="text-body-secondary mb-0">View profile, request rides, and track account state.</p>
        </div>
        <button id="logout-btn" class="btn btn-outline-danger">Logout</button>
      </div>

      <div id="dashboard-error" class="alert alert-danger d-none" role="alert"></div>
      <div id="dashboard-success" class="alert alert-success d-none" role="alert"></div>

      <div class="row g-4">
        <div class="col-12 col-lg-6">
          <section class="card border-0 shadow-sm h-100">
            <div class="card-body">
              <h2 class="h5 mb-3">Profile</h2>
              <dl class="row mb-3">
                <dt class="col-sm-4">Email</dt>
                <dd class="col-sm-8" id="user-email">-</dd>
                <dt class="col-sm-4">Role</dt>
                <dd class="col-sm-8 text-capitalize" id="user-role">-</dd>
                <dt class="col-sm-4">User ID</dt>
                <dd class="col-sm-8" id="user-id">-</dd>
              </dl>
              <label for="jwt-token" class="form-label small text-body-secondary">JWT Access Token</label>
              <textarea id="jwt-token" class="form-control" rows="4" readonly></textarea>
            </div>
          </section>
        </div>

        <div class="col-12 col-lg-6">
          <section class="card border-0 shadow-sm h-100">
            <div class="card-body">
              <h2 class="h5 mb-3">Current Location</h2>
              <p id="location-text" class="text-body-secondary mb-2">Locating…</p>
              <div id="location-map" class="location-map" role="img" aria-label="Current location map">
                <div id="location-pin" class="location-pin d-none"></div>
              </div>
            </div>
          </section>
        </div>

        <div class="col-12 col-xl-5">
          <section class="card border-0 shadow-sm h-100">
            <div class="card-body">
              <h2 class="h5 mb-3">Request a Ride</h2>
              <form id="ride-form" novalidate>
                <div class="row g-2">
                  <div class="col-6">
                    <label for="pickup-lat" class="form-label">Pickup Lat</label>
                    <input id="pickup-lat" type="number" step="any" class="form-control" required />
                  </div>
                  <div class="col-6">
                    <label for="pickup-lng" class="form-label">Pickup Lng</label>
                    <input id="pickup-lng" type="number" step="any" class="form-control" required />
                  </div>
                  <div class="col-6">
                    <label for="dropoff-lat" class="form-label">Dropoff Lat</label>
                    <input id="dropoff-lat" type="number" step="any" class="form-control" required />
                  </div>
                  <div class="col-6">
                    <label for="dropoff-lng" class="form-label">Dropoff Lng</label>
                    <input id="dropoff-lng" type="number" step="any" class="form-control" required />
                  </div>
                </div>
                <button id="request-ride-btn" type="submit" class="btn btn-primary mt-3 w-100">
                  <span class="btn-text">Request Ride</span>
                  <span class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
                </button>
              </form>
            </div>
          </section>
        </div>

        <div class="col-12 col-xl-7">
          <section class="card border-0 shadow-sm h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-3 gap-2">
                <h2 class="h5 mb-0">Ride History</h2>
                <button id="refresh-history-btn" class="btn btn-outline-secondary btn-sm">Refresh</button>
              </div>
              <ul id="ride-history" class="list-group"></ul>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script src="/dashboard.js" defer></script>
  </body>
</html>
